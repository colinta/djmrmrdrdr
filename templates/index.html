<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>musicplayer ui</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <button id="admin-toggle" class="btn" type="button" aria-expanded="false" aria-controls="admin-panel">admin</button>
    </div>

    <div
      id="control-panel-container"
      hx-get="/control-panel"
      hx-trigger="refresh-control-panel from:body"
      hx-swap="innerHTML"
    >
      {% include '_control_panel.html' %}
    </div>

    {% include '_admin_panel.html' %}

    <main class="grid">
      <div
        id="library-container"
        hx-get="/library"
        hx-trigger="refresh-library from:body"
        hx-swap="innerHTML"
      >
        {% include '_library.html' %}
      </div>

      <div
        id="current-queue-container"
        hx-get="/current-queue"
        hx-trigger="load, every 5s"
        hx-swap="innerHTML"
      >
        {% include '_current_queue.html' %}
      </div>
    </main>
  </div>
  <script>
    (() => {
      const delayMs = 5000;
      const container = document.getElementById('control-panel-container');
      const adminToggle = document.getElementById('admin-toggle');
      const adminPanel = document.getElementById('admin-panel');
      if (!container) return;

      let refreshTimer = null;

      const scheduleRefresh = () => {
        clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => {
          htmx.trigger(document.body, 'refresh-control-panel');
        }, delayMs);
      };

      scheduleRefresh();

      document.body.addEventListener('htmx:afterRequest', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }
      });

      document.body.addEventListener('htmx:responseError', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }
      });

      document.body.addEventListener('htmx:sendError', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }
      });

      if (adminToggle && adminPanel) {
        adminToggle.addEventListener('click', () => {
          const isHidden = adminPanel.hasAttribute('hidden');
          if (isHidden) {
            adminPanel.removeAttribute('hidden');
          } else {
            adminPanel.setAttribute('hidden', '');
          }
          adminToggle.setAttribute('aria-expanded', String(isHidden));
        });
      }

      const resetArchiveButton = (button) => {
        if (!button) return;
        if (button._verifyTimer) {
          window.clearTimeout(button._verifyTimer);
          button._verifyTimer = null;
        }
        button.dataset.verify = '';
        button.textContent = 'archive';
        button.title = 'archive';
      };

      document.body.addEventListener('click', (event) => {
        const button = event.target.closest('.archive-btn');
        if (!button) return;
        if (button.dataset.verify) {
          return;
        }

        event.preventDefault();
        button.dataset.verify = '1';
        button.textContent = 'really?';
        button.title = 'really?';
        button._verifyTimer = window.setTimeout(() => resetArchiveButton(button), 10000);
      });

      document.body.addEventListener('submit', async (event) => {
        const form = event.target.closest('.archive-form');
        if (!form) return;

        const button = form.querySelector('.archive-btn');
        if (!button || !button.dataset.verify) {
          event.preventDefault();
          return;
        }

        event.preventDefault();
        const submitter = button;
        const row = form.closest('tr');

        submitter.disabled = true;
        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {
              'HX-Request': 'true'
            }
          });
          if (!response.ok) {
            throw new Error('archive request failed');
          }

          if (row) {
            const tbody = row.parentElement;
            row.remove();
            if (tbody && !tbody.querySelector('tr')) {
              tbody.innerHTML = '<tr><td colspan="4" class="muted library-empty">no albums found</td></tr>';
            }
          }
          htmx.trigger(document.body, 'refresh-control-panel');
        } catch (_error) {
          form.submit();
          return;
        } finally {
          submitter.disabled = false;
        }
      });

      document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.detail.target && event.detail.target.id === 'library-container') {
          document.querySelectorAll('.archive-btn').forEach(resetArchiveButton);
        }
      });
    })();
  </script>
</body>
</html>

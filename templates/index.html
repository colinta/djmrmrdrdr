<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="format-detection" content="telephone=no">
  <title>musicplayer ui</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <div class="screen">
    <div class="topbar">
      <button id="admin-toggle" class="btn" type="button" aria-expanded="false" aria-controls="admin-panel">admin</button>
    </div>

    <div
      id="control-panel-container"
      hx-get="/control-panel"
      hx-trigger="refresh-control-panel from:body"
      hx-swap="innerHTML"
    >
      {% include '_control_panel.html' %}
    </div>

    {% include '_admin_panel.html' %}

    <main class="grid">
      <div
        id="library-container"
        hx-get="/library"
        hx-trigger="refresh-library from:body"
        hx-swap="innerHTML"
      >
        {% include '_library.html' %}
      </div>

      <div
        id="current-queue-container"
        hx-get="/current-queue"
        hx-trigger="load, every 5s"
        hx-swap="innerHTML"
      >
        {% include '_current_queue.html' %}
      </div>
    </main>
  </div>
  <script>
    (() => {
      const delayMs = 5000;
      const container = document.getElementById('control-panel-container');
      const adminToggle = document.getElementById('admin-toggle');
      const adminPanel = document.getElementById('admin-panel');
      if (!container) return;

      let refreshTimer = null;

      const scheduleRefresh = () => {
        clearTimeout(refreshTimer);
        refreshTimer = window.setTimeout(() => {
          htmx.trigger(document.body, 'refresh-control-panel');
        }, delayMs);
      };

      scheduleRefresh();

      const setAssignButtonState = (form, state) => {
        const assignButton = form.querySelector('button[type="submit"]');
        if (!assignButton) return;

        if (state === 'assigned' || state === 'pending') {
          assignButton.classList.add('assigned');
          assignButton.disabled = true;
          assignButton.title = state === 'assigned' ? 'assigned' : '...';
          return;
        }

        assignButton.classList.remove('assigned');
        assignButton.disabled = false;
        assignButton.title = '';
      };

      document.body.addEventListener('htmx:beforeRequest', (event) => {
        const requestElement = event.detail.elt;
        if (
          requestElement instanceof HTMLFormElement &&
          requestElement.action.endsWith('/assign/add')
        ) {
          setAssignButtonState(requestElement, 'pending');
        }
      });

      document.body.addEventListener('htmx:afterRequest', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }

        const requestElement = event.detail.elt;
        if (
          requestElement instanceof HTMLFormElement &&
          requestElement.action.endsWith('/assign/add')
        ) {
          if (event.detail.successful) {
            setAssignButtonState(requestElement, 'assigned');
          } else {
            setAssignButtonState(requestElement, 'idle');
          }
        }
      });

      document.body.addEventListener('htmx:responseError', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }
      });

      document.body.addEventListener('htmx:sendError', (event) => {
        if (event.detail.elt === container) {
          scheduleRefresh();
        }
      });

      if (adminToggle && adminPanel) {
        adminToggle.addEventListener('click', () => {
          const isHidden = adminPanel.hasAttribute('hidden');
          if (isHidden) {
            adminPanel.removeAttribute('hidden');
          } else {
            adminPanel.setAttribute('hidden', '');
          }
          adminToggle.setAttribute('aria-expanded', String(isHidden));
        });
      }

      const resetArchiveButton = (button) => {
        if (!button) return;
        if (button._verifyTimer) {
          window.clearTimeout(button._verifyTimer);
          button._verifyTimer = null;
        }
        button.dataset.verify = '';
        button.textContent = 'archive';
        button.title = 'archive';
      };

      const splitWords = (value) => value.toLowerCase().trim().split(/\s+/).filter(Boolean);

      const filterLibrary = () => {
        const input = document.getElementById('library-search');
        const resetButton = document.getElementById('library-reset');
        const favouritesButton = document.getElementById('library-favourites');
        const table = document.querySelector('#library-container .library-table');
        const tbody = table ? table.querySelector('tbody') : null;
        if (!input || !resetButton || !favouritesButton || !tbody) return;

        const queryTerms = splitWords(input.value);
        const favouritesOnly = favouritesButton.getAttribute('aria-pressed') === 'true';
        const rows = Array.from(tbody.querySelectorAll('tr[data-search-terms]'));
        let visibleCount = 0;

        rows.forEach((row) => {
          const sourceTerms = splitWords(row.dataset.searchTerms || '');
          const matchesSearch = queryTerms.every((queryTerm) => sourceTerms.some((sourceTerm) => sourceTerm.startsWith(queryTerm)));
          const matchesFavourite = !favouritesOnly || row.dataset.favourite === '1';
          const matches = matchesSearch && matchesFavourite;
          row.hidden = !matches;

          const albumId = row.dataset.albumId;
          const trackRow = albumId ? tbody.querySelector(`tr.library-track-row[data-album-id="${albumId}"]`) : null;
          if (trackRow) {
            const expanded = trackRow.dataset.tracksHidden !== '1';
            trackRow.hidden = !matches || !expanded;
          }

          if (matches) {
            visibleCount += 1;
          }
        });

        let emptyRow = tbody.querySelector('.library-empty-row');
        if (!visibleCount) {
          if (!emptyRow) {
            emptyRow = document.createElement('tr');
            emptyRow.className = 'library-empty-row';
            emptyRow.innerHTML = '<td colspan="3" class="muted library-empty">no albums found</td>';
            tbody.appendChild(emptyRow);
          }
        } else if (emptyRow) {
          emptyRow.remove();
        }

        resetButton.hidden = input.value.length === 0;
      };

      const initializeLibrarySearch = () => {
        const input = document.getElementById('library-search');
        const resetButton = document.getElementById('library-reset');
        const favouritesButton = document.getElementById('library-favourites');
        if (!input || !resetButton || !favouritesButton || input.dataset.initialized === '1') return;

        input.dataset.initialized = '1';
        input.addEventListener('input', filterLibrary);
        resetButton.addEventListener('click', () => {
          input.value = '';
          filterLibrary();
          input.focus();
        });
        favouritesButton.addEventListener('click', () => {
          const isPressed = favouritesButton.getAttribute('aria-pressed') === 'true';
          favouritesButton.setAttribute('aria-pressed', String(!isPressed));
          filterLibrary();
        });
        filterLibrary();
      };

      initializeLibrarySearch();

      document.body.addEventListener('click', (event) => {
        const toggle = event.target.closest('.library-tracks-toggle');
        if (toggle) {
          const albumId = toggle.dataset.albumId;
          const trackRow = albumId ? document.querySelector(`#library-container tr.library-track-row[data-album-id="${albumId}"]`) : null;
          if (trackRow) {
            const hidden = trackRow.dataset.tracksHidden === '1';
            trackRow.dataset.tracksHidden = hidden ? '0' : '1';
            trackRow.hidden = !hidden ? true : false;
            toggle.setAttribute('aria-expanded', hidden ? 'true' : 'false');
            toggle.textContent = `${hidden ? '▿' : '▹'} ${toggle.textContent.replace(/^[▹▿]\s*/, '')}`;
          }
          return;
        }

        const button = event.target.closest('.archive-btn');
        if (!button) return;
        if (button.dataset.verify) {
          return;
        }

        event.preventDefault();
        button.dataset.verify = '1';
        button.textContent = 'really?';
        button.title = 'really?';
        button._verifyTimer = window.setTimeout(() => resetArchiveButton(button), 10000);
      });

      document.body.addEventListener('submit', async (event) => {
        const form = event.target.closest('.archive-form');
        if (!form) return;

        const button = form.querySelector('.archive-btn');
        if (!button || !button.dataset.verify) {
          event.preventDefault();
          return;
        }

        event.preventDefault();
        const submitter = button;
        const row = form.closest('tr');

        submitter.disabled = true;
        try {
          const response = await fetch(form.action, {
            method: 'POST',
            body: new FormData(form),
            headers: {
              'HX-Request': 'true'
            }
          });
          if (!response.ok) {
            throw new Error('archive request failed');
          }

          if (row) {
            const tbody = row.parentElement;
            const albumId = row.dataset.albumId;
            const trackRow = albumId ? tbody.querySelector(`tr.library-track-row[data-album-id="${albumId}"]`) : null;
            row.remove();
            if (trackRow) {
              trackRow.remove();
            }
            if (tbody && !tbody.querySelector('tr[data-search-terms]')) {
              tbody.innerHTML = '<tr class="library-empty-row"><td colspan="3" class="muted library-empty">no albums found</td></tr>';
            }
            filterLibrary();
          }
          htmx.trigger(document.body, 'refresh-control-panel');
        } catch (_error) {
          form.submit();
          return;
        } finally {
          submitter.disabled = false;
        }
      });

      document.body.addEventListener('htmx:afterSwap', (event) => {
        if (event.detail.target && event.detail.target.id === 'library-container') {
          document.querySelectorAll('.archive-btn').forEach(resetArchiveButton);
          initializeLibrarySearch();
          filterLibrary();
        }
      });
    })();
  </script>
</body>
</html>

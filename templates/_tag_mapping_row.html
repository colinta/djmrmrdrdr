<tr>
  <td class="path mapping-uid">{{ mapping.uid }}</td>
  <td class="mapping-folder">
    <div class="mapping-form">
      <input type="text" value="{{ mapping.folder }}" readonly>
    </div>
  </td>
  <td class="mapping-delete">
    <form method="post" action="{{ url_for('mapping_delete') }}">
      <input type="hidden" name="uid" value="{{ mapping.uid }}">
      <button class="btn danger" type="submit">delete</button>
    </form>
  </td>
</tr>

<aside id="admin-panel" class="panel admin-panel" hidden>
  <div class="panel-title"><span>{{ title('admin panel') }}</span></div>

  <div class="admin-actions">
    <div class="admin-message"><span class="label">message</span> <span class="value accent">{{ runtime.message }}</span></div>
    <div class="admin-message"><span class="label">last unknown tag</span> <span class="value">{{ runtime.last_unknown_uid or 'none' }}</span></div>
    <div class="admin-buttons">
      <button class="btn" type="button" onclick="window.location.reload()">reload</button>
      <a class="btn" href="{{ url_for('admin_export_albums') }}" download>export</a>
    </div>
  </div>

  <div
    id="assignment-queue-container"
    hx-get="/assigment-queue"
    hx-trigger="load, every 10s"
    hx-swap="innerHTML"
  >
    {% include '_assignment_queue.html' %}
  </div>

  <div
    id="tag-mappings-container"
    hx-get="/tag-mappings"
    hx-trigger="refresh-tag-mappings from:body"
    hx-swap="innerHTML"
  >
    {% include '_tag_mappings.html' %}
  </div>
</aside>

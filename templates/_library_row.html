<tr class="library-album-row" data-album-id="{{ album_id }}" data-search-terms="{{ album.search_terms }}"{% if album.is_favourite %} data-favourite="1"{% endif %}>
  <td class="library-info">
    <div class="library-title">{{ album.album }} by {{ album.artist }}</div>
    <button
      class="library-tracks-toggle"
      type="button"
      data-album-id="{{ album_id }}"
      aria-expanded="false"
      aria-controls="library-tracks-{{ album_id }}"
    >▹ {{ album.track_count }} track{% if album.track_count != 1 %}s{% endif %}</button>
  </td>
  <td class="path library-folder">{{ album.folder }}</td>
  <td class="library-actions">
    <div class="action-buttons">
      <form
        method="post"
        action="{{ url_for('library_play') }}"
        hx-post="{{ url_for('library_play') }}"
        hx-target="#control-panel-container"
        hx-swap="innerHTML"
      >
        <input type="hidden" name="folder" value="{{ album.folder }}">
        <button class="btn" type="submit">play</button>
      </form>
      <form
        method="post"
        action="{{ url_for('assign_add') }}"
        hx-post="{{ url_for('assign_add') }}"
        hx-target="#assignment-queue-container"
        hx-swap="innerHTML"
      >
        <input type="hidden" name="folder" value="{{ album.folder }}">
        <button class="btn{% if album.is_assigned %} assigned{% endif %}" type="submit"{% if album.is_assigned %} disabled title="already assigned"{% endif %}>{% if album.is_assigned %}assigned{% else %}assign{% endif %}</button>
      </form>
      <form
        method="post"
        action="{{ url_for('library_queue') }}"
        hx-post="{{ url_for('library_queue') }}"
        hx-target="#current-queue-container"
        hx-swap="innerHTML"
      >
        <input type="hidden" name="folder" value="{{ album.folder }}">
        <button class="btn" type="submit">queue</button>
      </form>
      <form
        class="archive-form"
        method="post"
        action="{{ url_for('library_archive') }}"
      >
        <input type="hidden" name="folder" value="{{ album.folder }}">
        <button class="btn danger archive-btn" type="submit" data-verify="" title="archive">archive</button>
      </form>
    </div>
  </td>
</tr>
<tr class="library-track-row" id="library-tracks-{{ album_id }}" data-album-id="{{ album_id }}" data-tracks-hidden="1" hidden>
  <td colspan="3" class="library-track-cell">
    {% for track in album.tracks %}
      <div class="library-track-line">{{ loop.index }}. {{ track }}</div>
    {% else %}
      <div class="muted">no tracks found</div>
    {% endfor %}
  </td>
</tr>

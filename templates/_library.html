<section class="panel library-panel">
  <div class="panel-title"><span>{{ title('library') }}</span></div>
  <div class="search-bar">
    <input id="library-search" type="text" placeholder="search artist / album" autocomplete="off" autofocus>
    <button id="library-reset" class="btn" type="button" hidden>reset</button>
    <button id="library-favourites" class="btn toggle-btn" type="button" aria-pressed="false">favourites</button>
  </div>
  <div class="table-wrap">
    <table class="library-table">
      <thead>
        <tr>
          <th class="library-info">album</th>
          <th class="library-folder">folder</th>
          <th class="library-actions">actions</th>
        </tr>
      </thead>
      <tbody>
      {% for album in albums %}
        {% set album_id = loop.index0 %}
        {% include '_library_row.html' %}
      {% else %}
        <tr class="library-empty-row"><td colspan="3" class="muted library-empty">no albums found</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>

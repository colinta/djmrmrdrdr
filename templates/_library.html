<section class="panel library-panel">
  <div class="panel-title"><span>{{ title('library') }}</span></div>
  <form
    class="search-bar"
    method="get"
    action="{{ url_for('index') }}"
    hx-get="{{ url_for('library_partial') }}"
    hx-target="#library-container"
    hx-swap="innerHTML"
  >
    <input type="text" name="q" value="{{ query }}" placeholder="search artist / album / folder" autofocus>
    <button class="btn" type="submit">search</button>
  </form>
  <div class="table-wrap">
    <table class="library-table">
      <thead>
        <tr>
          <th class="library-artist">artist</th>
          <th class="library-album">album</th>
          <th class="library-folder">folder</th>
          <th class="library-actions">actions</th>
        </tr>
      </thead>
      <tbody>
      {% for album in albums %}
        {% include '_library_row.html' %}
      {% else %}
        <tr><td colspan="4" class="muted library-empty">no albums found</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>

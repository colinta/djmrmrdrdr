<section class="panel mappings-panel">
  <div class="panel-title"><span>{{ title('tag mappings') }}</span></div>
  <div class="table-wrap short">
    <table class="mappings-table">
      <thead>
        <tr>
          <th class="mapping-uid">uid</th>
          <th class="mapping-type">type</th>
          <th class="mapping-target">target</th>
          <th class="mapping-shuffle">shuffle</th>
          <th class="mapping-delete">delete</th>
        </tr>
      </thead>
      <tbody>
      {% for mapping in mappings %}
        {% include '_tag_mapping_row.html' %}
      {% else %}
        <tr><td colspan="5" class="muted">no mappings</td></tr>
      {% endfor %}
      </tbody>
    </table>
  </div>
</section>
